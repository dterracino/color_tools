name: Feature Request
description: Suggest a new feature or enhancement for color-match-tools
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please describe your idea clearly so it can be evaluated.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case or pain point this feature would address
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the feature you'd like to see. Include API ideas or CLI examples if relevant.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Have you considered any alternative approaches or workarounds?

  - type: dropdown
    id: area
    attributes:
      label: Feature area
      description: Which part of the library does this relate to?
      options:
        - Color conversions / color spaces
        - Distance metrics (Delta E)
        - Color / filament database
        - Gamut checking
        - CLI commands
        - Image processing (image extra)
        - Export formats
        - Interactive TUI (interactive extra)
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Any other information, references, or examples that support this request
