name: Bug Report
description: Report a bug or incorrect behavior in color-match-tools
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug! Please fill out as much detail as possible.

  - type: input
    id: version
    attributes:
      label: color-match-tools version
      description: Run `python -m color_tools --version` to find this
      placeholder: "e.g. 6.6.0"
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python version
      description: Run `python --version` to find this
      placeholder: "e.g. 3.12.2"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "e.g. Windows 11, Ubuntu 22.04, macOS 14"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug description
      description: A clear and concise description of what the bug is
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal code or CLI commands that reproduce the issue
      render: python
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened? Include any error messages or tracebacks.
    validations:
      required: true

  - type: textarea
    id: extras
    attributes:
      label: Installed extras
      description: Which optional extras do you have installed? (image, interactive, logging, all)
      placeholder: "e.g. pip install color-match-tools[image]"

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Any other information that might be relevant
